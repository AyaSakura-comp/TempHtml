// ===== Helpers =====
const catColors = {
  '咖啡廳':'#d4a373','農場':'#81b214','自然景點':'#588157',
  '觀光工廠':'#5b8fb9','景點':'#b565a7','博物館':'#7c629b',
  '文創園區':'#9a67a8','夜市':'#e07a5f','美食街':'#d4845a',
  '餐廳':'#c06c84','美食':'#d4a373'
};
const catEmojis = {
  '咖啡廳':'☕','農場':'🌿','自然景點':'🏞️',
  '觀光工廠':'🏭','景點':'📍','博物館':'🏛️',
  '文創園區':'🎨','夜市':'🌙','美食街':'🍜',
  '餐廳':'🍽️','美食':'🍰'
};

// Google Maps helper functions
function getGoogleMapsUrl(name, lat, lng) {
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(lat+','+lng)+'&query='+encodeURIComponent(name)}`;
}

function getGoogleMapsDirectionsUrl(name, lat, lng) {
  return `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
}

// ===== Map Setup =====
const map = L.map('map', { zoomControl: false }).setView([23.6, 120.7], 8);
L.control.zoom({ position: 'bottomright' }).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 18
}).addTo(map);

const markers = {};
const markerLayer = L.layerGroup().addTo(map);

attractions.forEach((a, i) => {
  const color = catColors[a.cat] || '#ffab00';
  const emoji = catEmojis[a.cat] || '📍';
  const icon = L.divIcon({
    className: 'custom-marker',
    html: `<div style="
      background:${color};width:26px;height:26px;
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      border:2px solid rgba(255,255,255,0.7);
      box-shadow:0 2px 6px rgba(0,0,0,0.5);
      display:flex;align-items:center;justify-content:center;
    "><span style="transform:rotate(45deg);font-size:11px;">${emoji}</span></div>`,
    iconSize: [26, 26], iconAnchor: [13, 26], popupAnchor: [0, -26]
  });

  const gmapsUrl = getGoogleMapsUrl(a.name, a.lat, a.lng);
  const directionsUrl = getGoogleMapsDirectionsUrl(a.name, a.lat, a.lng);

  const popupContent = `
    <div class="popup-card">
      <h3>${emoji} ${a.name}</h3>
      <span class="popup-cat cat-${a.cat}">${a.cat}</span>
      <div class="popup-loc">📍 ${a.loc}</div>
      <div class="popup-tags">
        ${a.tags.map(t => `<span class="popup-tag ${t==='美食'?'food':'cool'}">${t==='美食'?'🍴 吃喝':'❄️ 避暑'}</span>`).join('')}
      </div>
      <div class="gmaps-links">
        <a href="${gmapsUrl}" target="_blank" class="gmaps-link gmaps">📍 Google Maps</a>
        <a href="${directionsUrl}" target="_blank" class="gmaps-link nav">🧭 導航</a>
      </div>
    </div>`;

  const marker = L.marker([a.lat, a.lng], { icon }).bindPopup(popupContent, { className: 'custom-popup', maxWidth: 280 });
  marker._index = i;
  markers[i] = marker;
  markerLayer.addLayer(marker);
});

// ===== Sidebar UI =====
const listEl = document.getElementById('attraction-list');
const searchInput = document.getElementById('search-input');
const regionSelect = document.getElementById('region-select');
const categoryFiltersEl = document.getElementById('category-filters');

const regions = [...new Set(attractions.map(a => a.loc))].sort();
regions.forEach(r => {
  const opt = document.createElement('option');
  opt.value = r; opt.textContent = r;
  regionSelect.appendChild(opt);
});

const categories = [...new Set(attractions.map(a => a.cat))];
const activeCategories = new Set(categories);
categories.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn active';
  btn.textContent = `${catEmojis[c]||''} ${c}`;
  btn.dataset.cat = c;
  btn.addEventListener('click', () => {
    if (activeCategories.has(c)) { activeCategories.delete(c); btn.classList.remove('active'); }
    else { activeCategories.add(c); btn.classList.add('active'); }
    applyFilters();
  });
  categoryFiltersEl.appendChild(btn);
});

// Stats
document.getElementById('total-count').textContent = attractions.length;
document.getElementById('cafe-count').textContent = attractions.filter(a => a.cat === '咖啡廳').length;
document.getElementById('farm-count').textContent = attractions.filter(a => a.cat === '農場').length;
document.getElementById('factory-count').textContent = attractions.filter(a => a.cat === '觀光工廠').length;

function createCardHTML(a) {
  const emoji = catEmojis[a.cat] || '📍';
  const gmapsUrl = getGoogleMapsUrl(a.name, a.lat, a.lng);
  const directionsUrl = getGoogleMapsDirectionsUrl(a.name, a.lat, a.lng);

  return `
    <div class="card-body">
      <div class="card-header-row">
        <span class="card-name">${emoji} ${a.name}</span>
        <span class="card-cat cat-${a.cat}">${a.cat}</span>
      </div>
      <div class="card-loc">📍 ${a.loc}</div>
      <div class="card-tags">
        ${a.tags.map(t => `<span class="card-tag ${t==='美食'?'food':'cool'}">${t==='美食'?'🍴':'❄️'} ${t}</span>`).join('')}
      </div>
      <div style="display:flex;gap:4px;margin-top:6px;">
        <a href="${gmapsUrl}" target="_blank" class="gmaps-link gmaps" style="font-size:0.65em;padding:3px 8px;">📍 Google Maps</a>
        <a href="${directionsUrl}" target="_blank" class="gmaps-link nav" style="font-size:0.65em;padding:3px 8px;">🧭 導航</a>
      </div>
    </div>`;
}

function renderList(filtered) {
  listEl.innerHTML = '';
  filtered.forEach(a => {
    const card = document.createElement('div');
    card.className = 'attraction-card';
    card.dataset.index = a._idx;
    card.innerHTML = createCardHTML(a);
    card.addEventListener('click', (e) => {
      // Don't trigger if clicking links
      if (e.target.tagName === 'A') return;
      const m = markers[a._idx];
      map.setView([a.lat, a.lng], 13);
      m.openPopup();
      document.querySelectorAll('.attraction-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      // Close sidebar on mobile after selection
      if (window.innerWidth <= 768) toggleSidebar();
    });
    listEl.appendChild(card);
  });
  document.getElementById('visible-count').textContent = filtered.length;
}

function applyFilters() {
  const search = searchInput.value.toLowerCase();
  const region = regionSelect.value;

  let filtered = attractions.filter((a, i) => {
    a._idx = i;
    return (!search || a.name.toLowerCase().includes(search) || a.loc.toLowerCase().includes(search))
      && (region === 'all' || a.loc.includes(region))
      && activeCategories.has(a.cat);
  });

  renderList(filtered);

  const visibleIndices = new Set(filtered.map(a => a._idx));
  Object.keys(markers).forEach(i => {
    visibleIndices.has(parseInt(i)) ? markerLayer.addLayer(markers[i]) : markerLayer.removeLayer(markers[i]);
  });

  document.getElementById('total-visible').textContent = attractions.length;
}

searchInput.addEventListener('input', applyFilters);
regionSelect.addEventListener('change', applyFilters);
applyFilters();

// Close sidebar on mobile when clicking close button or backdrop
document.getElementById('filter-panel').addEventListener('click', (e) => {
  if (window.innerWidth <= 768) {
    // Check if clicking the "✕ 關閉" area (right side of filter panel)
    const rect = e.currentTarget.getBoundingClientRect();
    if (e.clientX > rect.right - 80) {
      if (document.getElementById('sidebar').classList.contains('open')) {
        toggleSidebar();
      }
    }
  }
});

// Close sidebar on mobile when clicking outside (backdrop)
document.getElementById('sidebar-backdrop').addEventListener('click', () => {
  const sidebar = document.getElementById('sidebar');
  if (sidebar.classList.contains('open')) {
    toggleSidebar();
  }
});

// Close sidebar on mobile when clicking map
map.on('click', () => {
  if (window.innerWidth <= 768) {
    const sidebar = document.getElementById('sidebar');
    if (sidebar.classList.contains('open')) {
      toggleSidebar();
    }
  }
});

// Close sidebar on mobile when popup closes
map.on('popupclose', () => {
  if (window.innerWidth <= 768) {
    const sidebar = document.getElementById('sidebar');
    if (sidebar.classList.contains('open')) {
      toggleSidebar();
    }
  }
});

// ===== Mobile toggle =====
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const isOpen = sidebar.classList.contains('open');
  if (isOpen) {
    sidebar.classList.remove('open');
    document.body.classList.remove('sidebar-open');
  } else {
    sidebar.classList.add('open');
    document.body.classList.add('sidebar-open');
  }
}

</script>
