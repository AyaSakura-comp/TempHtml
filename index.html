%8F%B0%E7%81%A3"}, {"id": "spot-44", "county": "南投", "name": "18度C巧克力工房", "lat": 23.97, "lng": 120.97, "tags": ["吃", "甜點", "伴手禮", "休息"], "note": "甜點補給很適合。", "color": "#fbbf24", "mapsUrl": "https://www.google.com/maps/search/?api=1&query=18%E5%BA%A6C%E5%B7%A7%E5%85%8B%E5%8A%9B%E5%B7%A5%E6%88%BF+%E5%8D%97%E6%8A%95+%E5%8F%B0%E7%81%A3"}, {"id": "spot-45", "county": "南投", "name": "日月老茶廠", "lat": 23.88, "lng": 120.92, "tags": ["茶體驗", "吃", "日式", "拍照"], "note": "茶香和導覽都很有特色。", "color": "#fbbf24", "mapsUrl": "https://www.google.com/maps/search/?api=1&query=%E6%97%A5%E6%9C%88%E8%80%81%E8%8C%B6%E5%BB%A0+%E5%8D%97%E6%8A%95+%E5%8F%B0%E7%81%A3"}, {"id": "spot-46", "county": "南投", "name": "埔里紙教堂", "lat": 23.96, "lng": 120.92, "tags": ["建築", "拍照", "咖啡", "散步"], "note": "以拍照和喝飲料為主。", "color": "#fbbf24", "mapsUrl": "https://www.google.com/maps/search/?api=1&query=%E5%9F%94%E9%87%8C%E7%B4%99%E6%95%99%E5%A0%82+%E5%8D%97%E6%8A%95+%E5%8F%B0%E7%81%A3"}, {"id": "spot-47", "county": "南投", "name": "元首館", "lat": 23.96, "lng": 120.97, "tags": ["拍照", "吃", "伴手禮", "親子"], "note": "好拍也能順便買點心。", "color": "#fbbf24", "mapsUrl": "https://www.google.com/maps/search/?api=1&query=%E5%85%83%E9%A6%96%E9%A4%A8+%E5%8D%97%E6%8A%95+%E5%8F%B0%E7%81%A3"}, {"id": "spot-48", "county": "南投", "name": "妮娜巧克力夢想城堡", "lat": 23.96, "lng": 120.95, "tags": ["甜點", "DIY", "室內", "拍照"], "note": "巧克力主題，體驗感夠。", "color": "#fbbf24", "mapsUrl": "https://www.google.com/maps/search/?api=1&query=%E5%A6%AE%E5%A8%9C%E5%B7%A7%E5%85%8B%E5%8A%9B%E5%A4%A2%E6%83%B3%E5%9F%8E%E5%A0%A1+%E5%8D%97%E6%8A%95+%E5%8F%B0%E7%81%A3"}, {"id": "spot-49", "county": "南投", "name": "車埕林班道", "lat": 23.83, "lng": 120.86, "tags": ["伴手禮", "DIY", "吃", "木作"], "note": "和車埕可一起玩。", "color": "#fbbf24", "mapsUrl": "https://www.google.com/maps/search/?api=1&query=%E8%BB%8A%E5%9F%95%E6%9E%97%E7%8F%AD%E9%81%93+%E5%8D%97%E6%8A%95+%E5%8F%B0%E7%81%A3"}, {"id": "spot-50", "county": "南投", "name": "日月潭纜車站", "lat": 23.86, "lng": 120.94, "tags": ["纜車", "風景", "輕鬆", "交通"], "note": "搭纜車 const countyOrder = ['台南','高雄','南投'];
const map = L.map('map', { zoomControl: true, scrollWheelZoom: true });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

const markers = new Map();
const cards = new Map();
const rail = document.getElementById('rail');
const countText = document.getElementById('countText');
let activeId = null;
let activeList = spots.slice();
let currentIndex = 0;

function markerHtml(spot, n) {
  return `<div class="marker" data-county="${spot.county}" data-n="${n}"></div>`;
}

function popupHtml(spot) {
  const tags = spot.tags.map(t => `<span class="tag">${t}</span>`).join('');
  return `
    <div class="popup">
      <h3>${spot.name}</h3>
      <p><b>${spot.county}</b> · ${spot.note}</p>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 10px;">${tags}</div>
      <a class="btn primary" href="${spot.mapsUrl}" target="_blank" rel="noopener">Google Maps</a>
    </div>`;
}

function build() {
  rail.innerHTML = '';
  spots.forEach((spot, idx) => {
    const icon = L.divIcon({
      className: '',
      html: markerHtml(spot, idx + 1),
      iconSize: [24, 24],
      iconAnchor: [12, 24],
      popupAnchor: [0, -20]
    });
    const marker = L.marker([spot.lat, spot.lng], { icon }).addTo(map).bindPopup(popupHtml(spot), { maxWidth: 280 });
    marker.on('click', () => activateSpot(spot.id));
    markers.set(spot.id, marker);

    const card = document.createElement('article');
    card.className = 'card';
    card.dataset.id = spot.id;
    card.dataset.county = spot.county;
    card.dataset.search = `${spot.name} ${spot.county} ${spot.tags.join(' ')} ${spot.note}`.toLowerCase();
    card.innerHTML = `
      <div class="card-top">
        <div>
          <div class="county">${spot.county}</div>
          <h3>${spot.name}</h3>
        </div>
        <div class="pin-dot" style="background:${spot.color}"></div>
      </div>
      <div class="card-body">
        <div class="tags">${spot.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        <p class="note">${spot.note}</p>
        <div class="actions">
          <a class="btn primary" href="${spot.mapsUrl}" target="_blank" rel="noopener">Google Maps</a>
        </div>
      </div>`;
    card.addEventListener('click', (e) => {
      if (e.target.closest('a')) return;
      activateSpot(spot.id, true);
    });
    rail.appendChild(card);
    cards.set(spot.id, card);
  });
}

function applyFilter() {
  const q = document.getElementById('q').value.trim().toLowerCase();
  const county = document.getElementById('county').value;
  activeList = spots.filter(s => {
    const countyOk = county === 'all' || s.county === county;
    const qOk = !q || `${s.name} ${s.county} ${s.tags.join(' ')} ${s.note}`.toLowerCase().includes(q);
    return countyOk && qOk;
  });
  spots.forEach(s => {
    const visible = activeList.some(x => x.id === s.id);
    markers.get(s.id).setOpacity(visible ? 1 : 0.15);
    cards.get(s.id).style.display = visible ? '' : 'none';
  });
  countText.textContent = `${activeList.length} 個地點`;
  if (activeList.length) {
    map.fitBounds(L.latLngBounds(activeList.map(s => [s.lat, s.lng])), { padding: [30, 30] });
    currentIndex = 0;
    activateSpot(activeList[0].id, false);
  }
}

function activateSpot(id, pan=false) {
  activeId = id;
  cards.forEach(c => c.classList.toggle('active', c.dataset.id === id));
  const spot = spots.find(s => s.id === id);
  if (!spot) return;
  const marker = markers.get(id);
  if (pan) map.flyTo([spot.lat, spot.lng], Math.max(map.getZoom(), 11), { duration: 0.8 });
  marker.openPopup();
  const card = cards.get(id);
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

function focusCurrent(delta) {
  if (!activeList.length) return;
  currentIndex = (currentIndex + delta + activeList.length) % activeList.length;
  activateSpot(activeList[currentIndex].id, true);
}

document.getElementById('q').addEventListener('input', applyFilter);
document.getElementById('county').addEventListener('change', applyFilter);
document.getElementById('fit').addEventListener('click', () => {
  const allBounds = L.latLngBounds(spots.map(s => [s.lat, s.lng]));
  map.fitBounds(allBounds, { padding: [30, 30] });
});
document.getElementById('next').addEventListener('click', () => focusCurrent(1));

build();
applyFilter();
map.fitBounds(L.latLngBounds(spots.map(s => [s.lat, s.lng])), { padding: [30, 30] });
</script>
</body>
</html>
