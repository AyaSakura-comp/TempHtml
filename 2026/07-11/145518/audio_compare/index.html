<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台語語音合成對比 | MERaLiON Hokkien TTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary: #06b6d4; /* Cyan */
            --primary-glow: rgba(6, 182, 212, 0.35);
            --secondary: #8b5cf6; /* Violet */
            --secondary-glow: rgba(139, 92, 246, 0.3);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-y: auto;
            padding: 40px 20px;
        }

        /* Animated background glows */
        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.4;
        }

        .glow-1 {
            width: 400px;
            height: 400px;
            background: var(--primary-glow);
            top: -100px;
            left: -100px;
        }

        .glow-2 {
            width: 500px;
            height: 500px;
            background: var(--secondary-glow);
            bottom: -150px;
            right: -150px;
        }

        .container {
            z-index: 1;
            width: 100%;
            max-width: 960px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff 0%, #a5f3fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            width: 100%;
        }

        @media (min-width: 768px) {
            .grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: rgba(6, 182, 212, 0.3);
        }

        .badge {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .card.primary-card .badge {
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.2);
            color: var(--primary);
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .card-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 24px;
            min-height: 20px;
        }

        /* Audio Player Styling */
        .player-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 16px;
            margin-top: auto;
        }

        .audio-control {
            width: 100%;
            margin-top: 10px;
            outline: none;
        }

        /* Stats list */
        .stat-list {
            margin-top: 20px;
            display: flex;
            gap: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 16px;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
        }

        .stat-num {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .stat-txt {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="container">
        <div class="header">
            <h1>台語語音合成輸入對比試聽</h1>
            <p>測試 MERaLiON Hokkien TTS 對於「漢字」與「台羅拼音」的合成效果與相容性</p>
        </div>

        <div class="grid">
            <!-- Han characters Card -->
            <div class="card primary-card">
                <span class="badge">推薦輸入格式</span>
                <h2 class="card-title">明仔載風颱會來咧</h2>
                <p class="card-subtitle">Han characters (漢字)</p>
                
                <div class="player-box">
                    <audio class="audio-control" controls src="test_han.wav"></audio>
                </div>

                <div class="stat-list">
                    <div class="stat-box">
                        <span class="stat-num">1.10s</span>
                        <span class="stat-txt">合成耗時</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-num">1.96s</span>
                        <span class="stat-txt">音檔長度</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-num">0.56x</span>
                        <span class="stat-txt">實時因子</span>
                    </div>
                </div>
            </div>

            <!-- Tai-lo Card -->
            <div class="card">
                <span class="badge">實驗性 / 相容性測試</span>
                <h2 class="card-title" style="font-size: 1.3rem; word-break: break-all;">Bîn-á-tsài hong-thai ē-lâi--eh</h2>
                <p class="card-subtitle">Tai-lo Pinyin (台羅拼音)</p>
                
                <div class="player-box">
                    <audio class="audio-control" controls src="test_tailo.wav"></audio>
                </div>

                <div class="stat-list">
                    <div class="stat-box">
                        <span class="stat-num">4.70s</span>
                        <span class="stat-txt">合成耗時</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-num">2.12s</span>
                        <span class="stat-txt">音檔長度</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-num">2.21x</span>
                        <span class="stat-txt">實時因子</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
